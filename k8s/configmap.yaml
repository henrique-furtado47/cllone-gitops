apiVersion: v1
kind: ConfigMap
metadata:
  name: cllone-config
  namespace: cllone
data:
  DEBUG: "False"
  ALLOWED_HOSTS: "*"
  DATABASE_ENGINE: postgresql
  POSTGRES_HOST: postgres-service
  POSTGRES_PORT: "5432"
  # Substitua SEU_IP_PUBLICO pelo IP público do control plane.
  # Porta 80 = acesso via Traefik (/, /api); 30100 = NodePort do frontend (fallback).
  CORS_ALLOWED_ORIGINS: "http://54.152.108.122,http://54.152.108.122:30100"
  CSRF_TRUSTED_ORIGINS: "http://54.152.108.122,http://54.152.108.122:30100"
