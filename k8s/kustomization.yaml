apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cllone
resources:
  - namespace.yaml
  - configmap.yaml
  - postgres-pvc.yaml
  - postgres-deployment.yaml
  - postgres-service.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
images:
  - name: henriquefurtado47/cllone-backend
    newName: henriquefurtado47/cllone-backend
    newTag: latest
  - name: henriquefurtado47/cllone-frontend
    newName: henriquefurtado47/cllone-frontend
    newTag: latest
