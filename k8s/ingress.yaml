# Ingress do Traefik (embutido no k3s).
# Roteamento por caminho, conforme sugerido na avaliação:
#   /        -> frontend (Vue)
#   /api     -> backend (Django REST)
#   /admin   -> backend (Django admin)
#   /static  -> backend (arquivos estáticos do Django)
#
# Os prefixos mais específicos (/api, /admin, /static) têm prioridade sobre "/"
# porque o Traefik ordena as rotas pelo comprimento do prefixo.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cllone-ingress
  namespace: cllone
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /static
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
